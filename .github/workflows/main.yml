name: UI Automation Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 设置全局环境变量，消除 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers are installed
      run: |
        sudo apt-get update
        # 整合所有的库安装和浏览器安装到一个 run 块中
        sudo apt-get install -y libgbm-dev libasound2t64 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libpango-1.0-0 libcairo2 libasound2
        python -m playwright install --with-deps chromium

    - name: Run tests
      run: |
        export PYTHONPATH=.
        pytest --alluredir=allure-results
      continue-on-error: true

    - name: Upload Debug Screenshot
      if: always() # 无论成功失败都尝试上传截图，方便我们对比本地和云端的差异
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: debug_baidu.png
        if-no-files-found: ignore

    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_report: allure-report
        allure_history: allure-history

    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report
